<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Movement</title>
  <meta name="description" content="A private, offline-capable movement tracker that adapts each day's workout to your energy, soreness, pain, and symptoms.">
  <link rel="canonical" href="https://eli-studio.github.io/movement-practice/">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Movement Practice">
  <meta property="og:description" content="A local-first movement tracker that adapts each day's workout to how your body actually feels.">
  <meta property="og:url" content="https://eli-studio.github.io/movement-practice/">
  <meta property="og:image" content="https://eli-studio.github.io/movement-practice/docs/social-preview.png">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="640">
  <meta property="og:image:alt" content="Movement Practice dashboard and four-week cycle progress">
  <meta name="twitter:card" content="summary_large_image">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Movement">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111613">
  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">

  <link rel="stylesheet" href="styles.css">

  <!-- Apply saved theme before first paint to avoid a flash of the wrong theme.
       Mirrors settings.theme in localStorage['movementPractice'] (older saves
       under the 'morningCircuit' codename are read as a fallback). Night is default. -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('movementPractice') || localStorage.getItem('morningCircuit') || '{}');
        var t = (s.settings && s.settings.theme) === 'day' ? 'day' : 'night';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'night');
      }
    })();
  </script>
</head>

<body>
  <div id="app" role="main">
    <div class="loading-screen" id="loading" role="status" aria-live="polite" aria-label="Loading Movement">
      <div class="movement-brand movement-brand--loading" aria-label="Movement Practice">
        <span class="movement-mark" aria-hidden="true"><span></span></span>
        <span class="movement-brand__type"><strong>Movement</strong><small>Practice</small></span>
      </div>
      <div class="loading-spinner" aria-hidden="true"></div>
    </div>
  </div>
  <!-- Screen-reader announcement region (route changes, timer start/stop, etc.) -->
  <div id="sr-announce" aria-live="polite" class="sr-only"></div>

  <!-- Chart.js — required by the Reports screen charts (reports.js uses window.Chart).
       Vendored locally (js/vendor/chart.umd.min.js, v4.4.0) so the app stays
       offline-first and never phones out to a CDN. -->
  <script src="js/vendor/chart.umd.min.js"></script>

  <script>
    // ES modules and JSON fetches are blocked when index.html is opened as a
    // local file. Give a useful launch path instead of leaving the loading
    // screen spinning forever.
    if (window.location.protocol === 'file:') {
      document.getElementById('app').innerHTML = `
        <main class="page page--no-nav" style="justify-content:center;min-height:100dvh;text-align:center;">
          <div class="movement-brand" aria-label="Movement Practice" style="justify-content:center;">
            <span class="movement-mark" aria-hidden="true"><span></span></span>
            <span class="movement-brand__type"><strong>Movement</strong><small>Practice</small></span>
          </div>
          <h1 class="page-title" style="margin-top:24px;">Open the local preview</h1>
          <p class="page-subtitle" style="margin:10px auto 24px;max-width:32rem;">
            Movement needs its local preview server to load workout data securely.
          </p>
          <a class="btn btn--primary" href="http://127.0.0.1:4174/" style="text-decoration:none;max-width:320px;margin:0 auto;">
            Open Movement
          </a>
        </main>`;
    } else {
      const appScript = document.createElement('script');
      appScript.type = 'module';
      appScript.src = 'js/app.js';
      document.body.appendChild(appScript);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) window.addEventListener('load', function () {
      navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'none' });
    });
  </script>
</body>
</html>
